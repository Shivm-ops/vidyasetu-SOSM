version: "3.9"

name: vidyasetu

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: vidyasetu-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vidyasetu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vidyasetu_pass}
      POSTGRES_DB: ${POSTGRES_DB:-vidyasetu_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vidyasetu -d vidyasetu_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: vidyasetu-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Qdrant Vector DB
  qdrant:
    image: qdrant/qdrant:latest
    container_name: vidyasetu-qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"
    restart: unless-stopped

  # API Service (Fastify)
  api:
    build:
      context: ./services/api
      dockerfile: ../../infrastructure/docker/api.Dockerfile
    container_name: vidyasetu-api
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${POSTGRES_USER:-vidyasetu}:${POSTGRES_PASSWORD:-vidyasetu_pass}@postgres:5432/${POSTGRES_DB:-vidyasetu_db}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-at-least-32-characters-long}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret-at-least-32-chars}
      API_PORT: 3001
      LOG_LEVEL: debug
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/api/src:/app/src
    restart: unless-stopped

  # AI Service (FastAPI)
  ai:
    build:
      context: ./services/ai
      dockerfile: ../../infrastructure/docker/ai.Dockerfile
    container_name: vidyasetu-ai
    environment:
      AI_SERVICE_PORT: 8000
      REDIS_URL: redis://redis:6379
      VECTOR_DB_URL: http://qdrant:6333
      DEBUG: "true"
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - qdrant
    volumes:
      - ./services/ai:/app
    restart: unless-stopped

  # Student Web App
  web:
    build:
      context: ./apps/web
      dockerfile: ../../infrastructure/docker/web.Dockerfile
    container_name: vidyasetu-web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_AI_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped

  # Teacher Portal
  teacher:
    build:
      context: ./apps/teacher
      dockerfile: ../../infrastructure/docker/web.Dockerfile
    container_name: vidyasetu-teacher
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - "3002:3000"
    depends_on:
      - api
    restart: unless-stopped

  # Admin Portal
  admin:
    build:
      context: ./apps/admin
      dockerfile: ../../infrastructure/docker/web.Dockerfile
    container_name: vidyasetu-admin
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - "3003:3000"
    depends_on:
      - api
    restart: unless-stopped

  # Parent Portal
  parent:
    build:
      context: ./apps/parent
      dockerfile: ../../infrastructure/docker/web.Dockerfile
    container_name: vidyasetu-parent
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - "3004:3000"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  qdrant_data:

networks:
  default:
    name: vidyasetu-network
