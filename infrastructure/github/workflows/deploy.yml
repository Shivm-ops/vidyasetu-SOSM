name: VidyaSetu Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: ap-south-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push API image
        run: |
          docker build -f infrastructure/docker/api.Dockerfile -t $ECR_REGISTRY/vidyasetu-api:${{ github.sha }} .
          docker push $ECR_REGISTRY/vidyasetu-api:${{ github.sha }}
          docker tag $ECR_REGISTRY/vidyasetu-api:${{ github.sha }} $ECR_REGISTRY/vidyasetu-api:latest
          docker push $ECR_REGISTRY/vidyasetu-api:latest

      - name: Build & push AI image
        run: |
          docker build -f infrastructure/docker/ai.Dockerfile -t $ECR_REGISTRY/vidyasetu-ai:${{ github.sha }} services/ai/
          docker push $ECR_REGISTRY/vidyasetu-ai:${{ github.sha }}

      - name: Build & push Web image
        run: |
          docker build -f infrastructure/docker/web.Dockerfile -t $ECR_REGISTRY/vidyasetu-web:${{ github.sha }} apps/web/
          docker push $ECR_REGISTRY/vidyasetu-web:${{ github.sha }}

      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster vidyasetu-prod \
            --service vidyasetu-api \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

          aws ecs update-service \
            --cluster vidyasetu-prod \
            --service vidyasetu-ai \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Run DB migrations
        run: |
          aws ecs run-task \
            --cluster vidyasetu-prod \
            --task-definition vidyasetu-migrate \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[${{ secrets.SUBNET_IDS }}],securityGroups=[${{ secrets.SG_IDS }}],assignPublicIp=ENABLED}"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      - name: Notify Slack
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: "VidyaSetu deployment ${{ job.status }}: ${{ github.sha }}"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
