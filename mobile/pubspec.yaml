name: vidyasetu
description: VidyaSetu - Bridging Knowledge, Skills, Career and Community
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # Network
  dio: ^5.4.3+1
  retrofit: ^4.2.0

  # Local Storage
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.1
  sqflite: ^2.3.3+1

  # UI
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.2
  fl_chart: ^0.68.0
  animated_bottom_navigation_bar: ^1.3.3

  # Media
  video_player: ^2.9.1
  chewie: ^1.8.3
  audioplayers: ^6.1.0
  flutter_tts: ^4.0.2
  speech_to_text: ^7.0.0

  # Notifications
  firebase_core: ^3.3.0
  firebase_messaging: ^15.0.4
  flutter_local_notifications: ^17.2.2

  # Auth
  google_sign_in: ^6.2.1
  local_auth: ^2.3.0

  # Utilities
  intl: ^0.19.0
  path_provider: ^2.1.3
  connectivity_plus: ^6.0.3
  permission_handler: ^11.3.1
  url_launcher: ^6.3.0
  share_plus: ^10.0.0
  image_picker: ^1.1.2
  file_picker: ^8.1.2

  # Offline
  workmanager: ^0.5.2
  background_fetch: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  riverpod_generator: ^2.4.0
  retrofit_generator: ^9.1.0
  hive_generator: ^2.0.1
  json_serializable: ^6.8.0
  freezed: ^2.5.7

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/fonts/

  fonts:
    - family: NotoSansDevanagari
      fonts:
        - asset: assets/fonts/NotoSansDevanagari-Regular.ttf
        - asset: assets/fonts/NotoSansDevanagari-Medium.ttf
          weight: 500
        - asset: assets/fonts/NotoSansDevanagari-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/NotoSansDevanagari-Bold.ttf
          weight: 700
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
